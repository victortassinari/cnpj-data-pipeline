# CNPJ Data Pipeline
#
# Usage:
#   docker compose up -d                              # Start pipeline
#   docker exec cnpj-pipeline python main.py --list   # List available months
#   docker exec cnpj-pipeline python main.py          # Process latest month
#   docker compose down                               # Stop services

services:
  pipeline:
    build: .
    container_name: cnpj-pipeline
    env_file: .env
    command: python main.py
    volumes:
      - ./temp:/app/temp
    restart: "no"
